<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진짜 로또 추첨기</title>
    <style>
        /* 1. 배경을 깔끔하게 꾸며주는 곳 (물감 칠하기) */
        body {
            background-color: #f0f4f8; /* 눈 편한 연한 회색 배경 */
            text-align: center;
            font-family: '맑은 고딕', sans-serif;
            margin-top: 100px;
        }
        .machine {
            background-color: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1); /* 그림자 넣어서 입체감 살리기! */
            display: inline-block;
        }
        button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background-color: #ff4757; /* 강렬한 빨간색 버튼 */
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.05); /* 마우스 올리면 버튼이 살짝 커짐 */
        }
        #result {
            margin-top: 40px;
            min-height: 80px;
        }
        
        /* 2. 공 모양 만들기 (찰흙 빚기) */
        .ball {
            display: inline-block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%; /* 완벽한 동그라미 */
            margin: 0 10px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 3px 3px 8px rgba(0,0,0,0.3); /* 공을 진짜처럼 동글동글하게! */
            animation: pop 0.5s ease-out; /* 뿅! 하고 나타나는 마법 */
        }
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 3. 진짜 로또 규칙대로 색깔 옷 입히기 */
        .yellow { background-color: #fbc531; color: #333; } /* 1~10번은 노란색 */
        .blue { background-color: #00a8ff; } /* 11~20번은 파란색 */
        .red { background-color: #e84118; } /* 21~30번은 빨간색 */
        .gray { background-color: #7f8fa6; } /* 31~40번은 회색 */
        .green { background-color: #4cd137; } /* 41~45번은 초록색 */
    </style>
</head>
<body>

    <div class="machine">
        <h1>🎰 인생역전 로또 추첨기</h1>
        <button onclick="drawLotto()">당첨 번호 뽑기!</button>
        <div id="result"></div>
    </div>

    <script>
        // 4. 로봇 두뇌 (번호 뽑고 색깔 맞추기)
        function drawLotto() {
            let numbers = [];
            while (numbers.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b); // 작은 숫자부터 순서대로 줄 세우기
            
            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = ""; // 예전 번호 청소하기
            
            // 공을 0.2초마다 하나씩 순서대로 뱉어내게 만드는 마법 (긴장감 조성!)
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    let ball = document.createElement("div");
                    ball.className = "ball";
                    ball.innerText = num;
                    
                    // 숫자에 맞는 색깔 옷 입혀주기
                    if (num <= 10) ball.classList.add("yellow");
                    else if (num <= 20) ball.classList.add("blue");
                    else if (num <= 30) ball.classList.add("red");
                    else if (num <= 40) ball.classList.add("gray");
                    else ball.classList.add("green");

                    resultDiv.appendChild(ball);
                }, index * 200); // 0.2초(200 밀리초) 곱하기 순서!
            });
        }
    </script>
</body>
</html>
