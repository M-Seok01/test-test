<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진짜 로또 추첨기</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2d3436;
            --card-bg: white;
            --btn-bg: #ff4757;
            --btn-hover: #ff6b81;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #2d3436;
            --text-color: #dfe6e9;
            --card-bg: #353b48;
            --btn-bg: #e67e22;
            --btn-hover: #f39c12;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            font-family: '맑은 고딕', sans-serif;
            margin-top: 100px;
            transition: background-color 0.3s, color 0.3s;
        }
        .machine {
            background-color: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px var(--shadow);
            display: inline-block;
            transition: background-color 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .mode-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.draw-btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.draw-btn:hover {
            transform: scale(1.05);
            background-color: var(--btn-hover);
        }
        #result {
            margin-top: 40px;
            min-height: 80px;
        }
        
        .ball {
            display: inline-block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            margin: 0 10px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 3px 3px 8px rgba(0,0,0,0.3);
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .yellow { background-color: #fbc531; color: #333; }
        .blue { background-color: #00a8ff; }
        .red { background-color: #e84118; }
        .gray { background-color: #7f8fa6; }
        .green { background-color: #4cd137; }
    </style>
</head>
<body>

    <div class="machine">
        <button class="mode-toggle" onclick="toggleMode()">다크 모드</button>
        <h1>🎰 인생역전 로또 추첨기</h1>
        <button class="draw-btn" onclick="drawLotto()">당첨 번호 뽑기!</button>
        <div id="result"></div>
    </div>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerText = '화이트 모드';
            } else {
                btn.innerText = '다크 모드';
            }
        }

        function drawLotto() {
            let numbers = [];
            while (numbers.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b);
            
            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";
            
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    let ball = document.createElement("div");
                    ball.className = "ball";
                    ball.innerText = num;
                    
                    if (num <= 10) ball.classList.add("yellow");
                    else if (num <= 20) ball.classList.add("blue");
                    else if (num <= 30) ball.classList.add("red");
                    else if (num <= 40) ball.classList.add("gray");
                    else ball.classList.add("green");

                    resultDiv.appendChild(ball);
                }, index * 200);
            });
        }
    </script>
</body>
</html>
