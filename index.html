<head>
    <meta charset="UTF-8">

    <title>진짜 로또 추첨기</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2d3436;
            --card-bg: white;
            --btn-bg: #ff4757;
            --btn-hover: #ff6b81;
            --shadow: rgba(0,0,0,0.1);
            --input-bg: #ffffff;
            --input-border: #dfe6e9;
        }

        body.dark-mode {
            --bg-color: #2d3436;
            --text-color: #dfe6e9;
            --card-bg: #353b48;
            --btn-bg: #e67e22;
            --btn-hover: #f39c12;
            --shadow: rgba(0,0,0,0.4);
            --input-bg: #2d3436;
            --input-border: #636e72;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            font-family: '맑은 고딕', sans-serif;
            margin-top: 50px;
            padding-bottom: 100px;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        .machine, .contact-form {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px var(--shadow);
            width: 100%;
            max-width: 500px;
            transition: background-color 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .mode-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.draw-btn, button.submit-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background-color: var(--btn-hover);
        }
        #result {
            margin-top: 30px;
            min-height: 80px;
        }
        
        .ball {
            display: inline-block;
            width: 55px;
            height: 55px;
            line-height: 55px;
            border-radius: 50%;
            margin: 5px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 3px 3px 8px rgba(0,0,0,0.3);
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .yellow { background-color: #fbc531; color: #333; }
        .blue { background-color: #00a8ff; }
        .red { background-color: #e84118; }
        .gray { background-color: #7f8fa6; }
        .green { background-color: #4cd137; }

        /* Form Styling */
        .contact-form h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-group textarea {
            height: 100px;
            resize: vertical;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="machine">
            <button class="mode-toggle" onclick="toggleMode()">다크 모드</button>
            <h1>🎰 로또 추첨기</h1>
            <button class="draw-btn" onclick="drawLotto()">당첨 번호 뽑기!</button>
            <div id="result"></div>
        </div>

        <div class="contact-form">
            <h2>🤝 제휴 문의</h2>
            <form action="https://formspree.io/f/xgolregk" method="POST">
                <div class="form-group">
                    <label>성함/기업명</label>
                    <input type="text" name="name" required placeholder="예: 홍길동 / (주)로또컴퍼니">
                </div>
                <div class="form-group">
                    <label>이메일 주소</label>
                    <input type="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>문의 내용</label>
                    <textarea name="message" required placeholder="제휴하고 싶은 내용을 적어주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>

        <div id="disqus_thread" style="width: 100%; max-width: 500px; background-color: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0px 10px 20px var(--shadow);"></div>
<script>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerText = '화이트 모드';
            } else {
                btn.innerText = '다크 모드';
            }
        }

        function drawLotto() {
            let numbers = [];
            while (numbers.length < 6) {
                let num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b);
            
            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";
            
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    let ball = document.createElement("div");
                    ball.className = "ball";
                    ball.innerText = num;
                    
                    if (num <= 10) ball.classList.add("yellow");
                    else if (num <= 20) ball.classList.add("blue");
                    else if (num <= 30) ball.classList.add("red");
                    else if (num <= 40) ball.classList.add("gray");
                    else ball.classList.add("green");

                    resultDiv.appendChild(ball);
                }, index * 200);
            });
        }
    </script>
</body>
